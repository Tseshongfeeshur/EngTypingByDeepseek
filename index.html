<!DOCTYPE html>
<html>

<head>
    <style>
        html,
        body {
            margin: 0;
        }

        body {
            height: 100vh;
            background-color: #222;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            user-select: none;
            position: relative;
        }

        .group {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        span {
            color: white;
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
        }

        .bar-box {
            width: 50%;
            height: 0.6em;
            border-radius: 999px;
            overflow: hidden;
        }

        .total-bar {
            background-color: white;
            width: 100%;
            height: 100%;
        }

        .progress-bar {
            background-color: #2200ff;
            height: 100%;
            width: 0px;
            border-radius: 0 999px 999px 0;
        }

        #result-view {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: #000c;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #result-view.failed {
            background-color: rgba(84, 12, 12, 0.8);
        }

        #result-view span {
            font-size: 12dvw;
            letter-spacing: 3px;
        }

        #sccd-text {
            color: rgb(78, 230, 78);
        }

        #failed-text {
            color: rgb(255, 30, 30);
        }

        #result-view button {
            font-size: 20px;
            width: fit-content;
            padding: 1rem 2rem;
            display: inline;
            background-color: transparent;
            color: white;
            border: 6px solid white;
            margin-top: 4rem;
            cursor: pointer;
            font-weight: 700;
        }

        #result-view button:hover {
            color: rgba(255, 255, 255, 0.507);
            border: 6px solid rgba(255, 255, 255, 0.507);
        }

        #result-view button:active {
            color: rgba(255, 255, 255, 0.219);
            border: 6px solid rgba(255, 255, 255, 0.219);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div class="group" id="value-group">
        <span>V A L U E</span>
        <div class="bar-box">
            <div class="total-bar" id="value-total-bar">
                <div class="progress-bar" id="value-progress-bar">
                </div>
            </div>
        </div>
    </div>
    <div class="group" id="time-group">
        <span>T I M E</span>
        <div class="bar-box">
            <div class="total-bar" id="time-total-bar">
                <div class="progress-bar" id="time-progress-bar">
                </div>
            </div>
        </div>
    </div>
    <div id="result-view" class="hidden">
        <span id="sccd-text" class="hidden">YOU WIN</span>
        <span id="failed-text" class="hidden">GAME OVER</span>
        <button>Try Again</button>
    </div>
    <script>
        const valueTotalBar = document.getElementById("value-total-bar");
        const valueProgressBar = document.getElementById("value-progress-bar");
        const timeTotalBar = document.getElementById("time-total-bar");
        const timeProgressBar = document.getElementById("time-progress-bar");
        const resultView = document.getElementById("result-view");
        const resultViewSccdContent = document.getElementById("sccd-text");
        const resultViewFailedContent = document.getElementById("failed-text");
        const refreshButton = resultView.querySelector("button");
        const body = document.body;

        // 初始化进度和时间百分数
        var value = 10;
        var time = 0;

        // 空闲每帧更新
        function idleUpdate() {
            // ---处理进度---
            if (value > 0 && value < 100) {
                // 进度百分比在正常范围时
                value -= 0.1;
            } else if (value <= 0) {
                // 进度归零时
                showFailedStatu();
                value = 0;
            } else {
                // 进度满时
                showSucceedStatu();
                value = 100;
            }
            // 更新前端
            valueProgressBar.style.width = `${value}%`;

            // ---处理时间---
            if (time < 100) {
                // 时间百分比在正常范围时
                time += 0.12;
            } else {
                // 超时时
                showFailedStatu();
                time = 100;
            }
            //更新前端
            timeProgressBar.style.width = `${time}%`;
        }

        // 点击时
        function clickUpdate() {
            value += 3.2;
        }

        // 停止游戏，注销守护动作
        function stopGame() {
            if (updateInterval)
                clearInterval(updateInterval);
            body.removeEventListener('click', clickUpdate);
        }

        // 注册音效对象
        const sccdSound = new Audio('assets/audio/sccd.mp3');
        sccdSound.preload = 'auto';
        const failedSound = new Audio('assets/audio/failed.mp3');
        failedSound.preload = 'auto';

        function showSucceedStatu() {
            stopGame();

            sccdSound.currentTime = 0;
            sccdSound.play().catch(e => console.error(e));

            resultViewSccdContent.classList.remove('hidden');
            resultView.classList.remove('hidden');
            refreshButton.addEventListener('click', () => location.reload());
        }

        function showFailedStatu() {
            stopGame();

            failedSound.currentTime = 0;
            failedSound.play().catch(e => console.error(e));

            resultView.classList.add('failed');

            resultViewFailedContent.classList.remove('hidden');
            resultView.classList.remove('hidden');
            refreshButton.addEventListener('click', () => location.reload());
        }

        // 注册守护动作
        var updateInterval = setInterval(idleUpdate, 1000 / 60);
        body.addEventListener('click', clickUpdate);
    </script>
</body>

</html>
